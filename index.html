<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Job Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            background-color: #f4f4f4;
        }
        header {
            background-color: #007bff;
            color: white;
            padding: 15px;
            font-size: 24px;
        }
        .container {
            margin-top: 20px;
        }
        .job-list {
            width: 50%;
            margin: auto;
            background: white;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        .job {
            border-bottom: 1px solid #ccc;
            padding: 10px;
        }
        .job:last-child {
            border-bottom: none;
        }
        .apply-btn {
            background: green;
            color: white;
            padding: 8px;
            text-decoration: none;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <header>Welcome to My Job Portal</header>

    <div class="container">
        <div class="job-list">
            <div class="job">
                <h3>Software Engineer</h3>
                <p>Company: ABC Tech</p>
                <p>Location: Remote</p>
                <a href="#" class="apply-btn">Apply Now</a>
            </div>
            <div class="job">
                <h3>Web Developer</h3>
                <p>Company: XYZ Solutions</p>
                <p>Location: New York</p>
                <a href="#" class="apply-btn">Apply Now</a>
            </div>
        </div>
    </div>

</body>
</html>
